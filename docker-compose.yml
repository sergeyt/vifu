services:
  vifu-bot:
    build: .
    restart: unless-stopped
    env_file: bot/.env
    environment:
      VIFU_ROOT: /app
      DATA_DIR: /data
    volumes:
      - vifu-data:/data
    # Uncomment for webhook mode (requires HTTPS reverse proxy on :8787):
    # ports:
    #   - "8787:8787"

volumes:
  vifu-data:
