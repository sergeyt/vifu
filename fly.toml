# vifu Telegram bot on Fly.io
# Docs: https://fly.io/docs/reference/configuration/
#
# Single-machine polling bot. Scale stays at 1 via deploy workflow + fly scale count 1.
# Webhook: set secrets BOT_PUBLIC_URL + PORT=8787, then uncomment [http_service] below.

app = "vifu"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  VIFU_ROOT = "/app"
  MAX_VIDEO_MB = "20"
  MAX_CONCURRENT_RENDERS = "1"
  MAX_RENDER_QUEUE = "3"

[deploy]
  strategy = "immediate"

# One shared VM — enough for 1 render at a time (see render queue in bot).
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"

# --- Webhook mode (optional) ---
