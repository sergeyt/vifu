# vifu Telegram bot on Fly.io
# Docs: https://fly.io/docs/reference/configuration/
#
# Polling for Telegram + HTTP /health for Fly (keeps machine alive).
# Webhook mode: set BOT_PUBLIC_URL secret — bot switches automatically.

app = "vifu"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  VIFU_ROOT = "/app"
  MAX_VIDEO_MB = "20"
  MAX_CONCURRENT_RENDERS = "1"
  MAX_RENDER_QUEUE = "3"
  PORT = "8787"

[deploy]
  strategy = "immediate"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "2gb"

# Required on Fly: health check keeps the machine running (polling still uses Telegram getUpdates).
[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "5s"

# Webhook mode (optional — replaces polling; also needs BOT_PUBLIC_URL secret):
# fly secrets set BOT_PUBLIC_URL=https://vifu.fly.dev -a vifu
