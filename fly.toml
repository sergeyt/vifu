# fly.toml app configuration file generated for vifu on 2026-06-20T12:19:47Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'vifu-bot'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

# OpenCV + ffmpeg peaks; bump memory if renders OOM.
[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 256

# vifu Telegram bot on Fly.io
# Docs: https://fly.io/docs/reference/configuration/
#
# Polling mode (default): no [http_service] — the machine runs Dockerfile CMD 24/7.
# Webhook mode: uncomment [http_service] + set secrets BOT_PUBLIC_URL and PORT.

[env]
  VIFU_ROOT = "/app"
  MAX_VIDEO_MB = "20"

[deploy]
  strategy = "immediate"

