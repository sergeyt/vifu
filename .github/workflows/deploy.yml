name: deploy

on:
  workflow_run:
    workflows:
      - build
    types:
      - completed
    branches:
      - main

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  fly:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: read app name
        run: |
          APP=$(sed -n "s/^app = [\"'\'']\\([^\"'\'']*\\)[\"'\''].*/\\1/p" fly.toml | head -1)
          if [ -z "$APP" ]; then
            echo "::error::Could not read app name from fly.toml"
            exit 1
          fi
          echo "APP=$APP" >> "$GITHUB_ENV"
          echo "Deploying app: $APP"

      - name: deploy to fly.io
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::FLY_API_TOKEN secret is missing in GitHub repo settings"
            exit 1
          fi
          flyctl deploy --remote-only --app "$APP"
          flyctl scale count 1 --app "$APP" --yes
